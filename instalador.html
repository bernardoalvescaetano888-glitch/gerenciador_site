<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerenciador do Bernardo</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
    }

    .container {
      margin-top: 40px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .exe {
      background: #22c55e;
      color: black;
    }

    .py {
      background: #3b82f6;
      color: white;
    }

    footer {
      margin-top: 50px;
      color: gray;
    }
  </style>
</head>
<body>

  <h1>Gerenciador de Compras</h1>
  <p>Organize seus gastos de forma simples e poderosa</p>

  <div class="container">

    <div class="card">
      <h2>Versão pronta (.exe)</h2>
      <p>Para quem só quer usar o programa</p>
      <a href="https://drive.google.com/file/d/1Ow1fp7Sw9VfUkW1QTC3JWjrnp2_vNVkc/view?usp=drive_link" target="_blank">
        <button class="exe">Baixar EXE</button>
      </a>
    </div>

    <div class="card">
      <h2>Versão código (.py)</h2>
      <p>Para quem quer estudar ou modificar</p>
      <a href="https://drive.google.com/file/d/1WSI4NTLbszz2kGQrQ3nEOvM08s2We7me/view?usp=drive_link" target="_blank">
        <button class="py">Baixar Código + Guia</button>
      </a>
    </div>

  </div>

  <footer>
    Criado por Bernardo 🚀
  </footer>

</body>
</html>
